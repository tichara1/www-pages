<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Évora — večer, složený</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #2a2622; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  button { font-family: inherit; }

  @keyframes screenIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes sheetIn {
    0%   { transform: translateY(100%); }
    100% { transform: translateY(0); }
  }
  @keyframes sheetOut {
    0%   { transform: translateY(0); }
    100% { transform: translateY(100%); }
  }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  @keyframes letterOpen {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-cz.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  function Mount() {
    const [size, setSize] = useState({ w: window.innerWidth, h: window.innerHeight });
    useEffect(() => {
      const onR = () => setSize({ w: window.innerWidth, h: window.innerHeight });
      window.addEventListener('resize', onR);
      return () => window.removeEventListener('resize', onR);
    }, []);

    // Scale device down to fit viewport with comfortable margin
    const targetW = 402;
    const targetH = 874;
    const fit = Math.min((size.w - 40) / targetW, (size.h - 40) / targetH, 1);

    return (
      <div style={{
        width: '100%', height: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: '#2a2622',
      }}>
        <div style={{ transform: `scale(${fit})`, transformOrigin: 'center center' }}>
          <IOSDevice width={targetW} height={targetH}>
            <div style={{ position: 'relative', width: '100%', height: '100%', overflow: 'hidden', background: '#F5F1EA' }}>
              <App />
            </div>
          </IOSDevice>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Mount />);
</script>
</body>
</html>

<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Reserve — Fitness reservation system</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1814; color: #fff; font-family: 'Inter', sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="map.jsx"></script>
<script type="text/babel" src="customer.jsx"></script>
<script type="text/babel" src="trainer.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "lang": "cz",
  "filterStyle": "slider",
  "customerView": "list",
  "accent": "lime"
}/*EDITMODE-END*/;

const ACCENTS = {
  lime:    { accent: 'oklch(0.86 0.18 130)', accentInk: '#0A0B0D', accentSoft: 'oklch(0.86 0.18 130 / 0.14)', accentBorder: 'oklch(0.86 0.18 130 / 0.35)' },
  cyan:    { accent: 'oklch(0.82 0.14 220)', accentInk: '#0A0B0D', accentSoft: 'oklch(0.82 0.14 220 / 0.14)', accentBorder: 'oklch(0.82 0.14 220 / 0.35)' },
  orange:  { accent: 'oklch(0.78 0.17 55)',  accentInk: '#0A0B0D', accentSoft: 'oklch(0.78 0.17 55 / 0.14)',  accentBorder: 'oklch(0.78 0.17 55 / 0.35)' },
  magenta: { accent: 'oklch(0.76 0.20 340)', accentInk: '#0A0B0D', accentSoft: 'oklch(0.76 0.20 340 / 0.14)', accentBorder: 'oklch(0.76 0.20 340 / 0.35)' },
};

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [editMode, setEditMode] = React.useState(false);

  // Apply accent override to T
  React.useEffect(() => {
    const a = ACCENTS[tweaks.accent] || ACCENTS.lime;
    Object.assign(T, a);
  }, [tweaks.accent]);

  // Tweaks host bridge
  React.useEffect(() => {
    const onMsg = (ev) => {
      const d = ev.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const patch = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const L = tweaks.lang;
  const FS = tweaks.filterStyle;
  const CV = tweaks.customerView;

  return (
    <>
      <DesignCanvas>
        <DCSection id="zakaznik" title="Zákazník" subtitle="Discovery · rezervace · check-in · profil">
          <DCArtboard id="z1" label="01 · Mapa + filtr dojezdu" width={402} height={874}>
            <CustomerMap lang={L} filterStyle={FS} view={CV} />
          </DCArtboard>
          <DCArtboard id="z2" label="02 · Smart návrhy — stihl bys teď" width={402} height={874}>
            <CustomerSuggestions lang={L} />
          </DCArtboard>
          <DCArtboard id="z3" label="03 · Detail lekce + kompatibilita trenéra" width={402} height={874}>
            <CustomerLessonDetail lang={L} />
          </DCArtboard>
          <DCArtboard id="z4" label="04 · QR check-in + streak" width={402} height={874}>
            <CustomerCheckIn lang={L} />
          </DCArtboard>
          <DCArtboard id="z5" label="05 · Profil + activity grid" width={402} height={874}>
            <CustomerProfile lang={L} />
          </DCArtboard>
        </DCSection>

        <DCSection id="trener" title="Trenér" subtitle="Dashboard · šablony · rozvrh · účastníci">
          <DCArtboard id="t1" label="01 · Dashboard — dnes" width={402} height={874}>
            <TrainerDashboard lang={L} />
          </DCArtboard>
          <DCArtboard id="t2" label="02 · Šablona lekce + opakování" width={402} height={874}>
            <TrainerTemplate lang={L} />
          </DCArtboard>
          <DCArtboard id="t3" label="03 · Rozvrh — týden" width={402} height={874}>
            <TrainerSchedule lang={L} />
          </DCArtboard>
          <DCArtboard id="t4" label="04 · Účastníci + live QR" width={402} height={874}>
            <TrainerAttendees lang={L} />
          </DCArtboard>
        </DCSection>

        <DCSection id="admin" title="Admin" subtitle="Console · heatmapa · uživatelé · pobočky">
          <DCArtboard id="a1" label="01 · Console — KPI & alerts" width={402} height={874}>
            <AdminOverview lang={L} />
          </DCArtboard>
          <DCArtboard id="a2" label="02 · Heatmapa obsazenosti" width={402} height={874}>
            <AdminHeatmap lang={L} />
          </DCArtboard>
          <DCArtboard id="a3" label="03 · Uživatelé & role" width={402} height={874}>
            <AdminUsers lang={L} />
          </DCArtboard>
          <DCArtboard id="a4" label="04 · Pobočky · live mapa" width={402} height={874}>
            <AdminLocations lang={L} />
          </DCArtboard>
        </DCSection>

        <DCPostIt top={10} left={460} rotate={-3} width={220}>
          Customer flow — všechny hlavní vychytávky jsou tady:<br/>
          mapa s dojezdem, smart návrhy, kompatibilita trenéra, QR check-in, streak.
        </DCPostIt>
        <DCPostIt top={20} left={1700} rotate={2} width={210}>
          Filter dojezdu nabízí 3 varianty přes Tweaks: PILL, SLIDER, DIAL. Klikni na ikonu 🎛 vpravo.
        </DCPostIt>
      </DesignCanvas>

      {editMode && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 200,
          width: 300, background: '#17181B', border: '1px solid rgba(255,255,255,0.14)', borderRadius: 14,
          padding: 16, fontFamily: 'Inter, sans-serif', color: '#F4F4F5',
          boxShadow: '0 20px 60px rgba(0,0,0,0.6)',
        }}>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: '#A1A1AA', letterSpacing: 1.2, marginBottom: 12 }}>TWEAKS · RESERVE</div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: '#A1A1AA', marginBottom: 6, fontFamily: 'JetBrains Mono, monospace', letterSpacing: 0.5 }}>JAZYK</div>
            <div style={{ display: 'flex', gap: 4 }}>
              {['cz','en'].map(v => (
                <button key={v} onClick={() => patch('lang', v)} style={{
                  flex: 1, padding: '7px 0', borderRadius: 7,
                  background: L === v ? ACCENTS[tweaks.accent].accent : 'transparent',
                  color: L === v ? '#0A0B0D' : '#F4F4F5',
                  border: `1px solid ${L === v ? 'transparent' : 'rgba(255,255,255,0.14)'}`,
                  fontFamily: 'JetBrains Mono, monospace', fontSize: 11, fontWeight: 600, letterSpacing: 0.5, cursor: 'pointer',
                  textTransform: 'uppercase',
                }}>{v}</button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: '#A1A1AA', marginBottom: 6, fontFamily: 'JetBrains Mono, monospace', letterSpacing: 0.5 }}>FILTR DOJEZDU</div>
            <div style={{ display: 'flex', gap: 4 }}>
              {['pill','slider','dial'].map(v => (
                <button key={v} onClick={() => patch('filterStyle', v)} style={{
                  flex: 1, padding: '7px 0', borderRadius: 7,
                  background: FS === v ? ACCENTS[tweaks.accent].accent : 'transparent',
                  color: FS === v ? '#0A0B0D' : '#F4F4F5',
                  border: `1px solid ${FS === v ? 'transparent' : 'rgba(255,255,255,0.14)'}`,
                  fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, fontWeight: 600, letterSpacing: 0.4, cursor: 'pointer',
                  textTransform: 'uppercase',
                }}>{v}</button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: '#A1A1AA', marginBottom: 6, fontFamily: 'JetBrains Mono, monospace', letterSpacing: 0.5 }}>ZÁKAZNÍK · VIEW</div>
            <div style={{ display: 'flex', gap: 4 }}>
              {['map','list'].map(v => (
                <button key={v} onClick={() => patch('customerView', v)} style={{
                  flex: 1, padding: '7px 0', borderRadius: 7,
                  background: CV === v ? ACCENTS[tweaks.accent].accent : 'transparent',
                  color: CV === v ? '#0A0B0D' : '#F4F4F5',
                  border: `1px solid ${CV === v ? 'transparent' : 'rgba(255,255,255,0.14)'}`,
                  fontFamily: 'JetBrains Mono, monospace', fontSize: 11, fontWeight: 600, letterSpacing: 0.5, cursor: 'pointer',
                  textTransform: 'uppercase',
                }}>{v}</button>
              ))}
            </div>
          </div>

          <div>
            <div style={{ fontSize: 11, color: '#A1A1AA', marginBottom: 6, fontFamily: 'JetBrains Mono, monospace', letterSpacing: 0.5 }}>AKCENT</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {Object.keys(ACCENTS).map(v => (
                <button key={v} onClick={() => patch('accent', v)} style={{
                  flex: 1, height: 32, borderRadius: 7,
                  background: ACCENTS[v].accent,
                  border: `2px solid ${tweaks.accent === v ? '#fff' : 'transparent'}`,
                  cursor: 'pointer',
                }} />
              ))}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
